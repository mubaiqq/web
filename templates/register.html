{{ define "register.html" }}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>注册 — DomainOS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:'#6366f1',primaryDark:'#4f46e5'}}}}</script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    .glass{background:rgba(255,255,255,0.72);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border-bottom:1px solid rgba(255,255,255,0.3)}
    .page-bg{background:linear-gradient(135deg,#eef2ff 0%,#e0e7ff 30%,#f0f9ff 60%,#ede9fe 100%)}
  </style>
</head>
<body class="page-bg text-gray-900 min-h-screen">

  <nav class="glass fixed top-0 w-full z-50">
    <div class="max-w-6xl mx-auto px-6 h-14 flex items-center justify-between">
      <a href="/" class="flex items-center gap-2.5 text-gray-900 font-bold text-lg no-underline">
        <div class="w-8 h-8 rounded-xl bg-gradient-to-br from-indigo-500 to-violet-500 flex items-center justify-center shadow-md shadow-indigo-200">
          <i data-lucide="globe" class="w-4 h-4 text-white"></i>
        </div>
        DomainOS
      </a>
      <a href="/login" class="text-sm text-gray-500 hover:text-gray-900 transition px-3 py-1.5 rounded-lg hover:bg-white/50">已有账号？登录</a>
    </div>
  </nav>

  <div class="flex items-center justify-center min-h-screen px-6 pt-14">
    <div class="w-full max-w-sm">
      <div class="bg-white/70 backdrop-blur-xl border border-white/50 rounded-3xl p-8 shadow-xl shadow-indigo-100/30">
        <div class="text-center mb-6">
          <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-indigo-500 to-violet-500 flex items-center justify-center mx-auto mb-4 shadow-lg shadow-indigo-200">
            <i data-lucide="user-plus" class="w-5 h-5 text-white"></i>
          </div>
          <h2 class="text-xl font-bold">创建账号</h2>
          <p class="text-sm text-gray-400 mt-1">注册后即可绑定域名、创建页面</p>
        </div>

        {{ if .Error }}
          <div class="flex items-center gap-2 p-3 bg-red-50/80 border border-red-100 rounded-xl mb-4 text-sm text-red-500">
            <i data-lucide="alert-circle" class="w-4 h-4 flex-shrink-0"></i>
            {{ .Error }}
          </div>
        {{ end }}

        <form method="POST" action="/register" class="space-y-3.5">
          <div>
            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">用户名</label>
            <input type="text" name="username" placeholder="字母或数字，3-20位" required autofocus
              class="w-full px-4 py-2.5 bg-white/60 border border-gray-200/80 rounded-xl text-base outline-none focus:border-indigo-400 focus:ring-4 focus:ring-indigo-50 transition">
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">邮箱</label>
            <input type="email" name="email" placeholder="you@example.com" required
              class="w-full px-4 py-2.5 bg-white/60 border border-gray-200/80 rounded-xl text-base outline-none focus:border-indigo-400 focus:ring-4 focus:ring-indigo-50 transition">
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">密码</label>
            <input type="password" name="password" placeholder="至少6位" required
              class="w-full px-4 py-2.5 bg-white/60 border border-gray-200/80 rounded-xl text-base outline-none focus:border-indigo-400 focus:ring-4 focus:ring-indigo-50 transition">
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">确认密码</label>
            <input type="password" name="confirm" placeholder="再次输入密码" required
              class="w-full px-4 py-2.5 bg-white/60 border border-gray-200/80 rounded-xl text-base outline-none focus:border-indigo-400 focus:ring-4 focus:ring-indigo-50 transition">
          </div>
          <button type="submit" class="w-full py-2.5 bg-gradient-to-r from-indigo-500 to-violet-500 hover:from-indigo-600 hover:to-violet-600 text-white text-sm font-semibold rounded-xl shadow-md shadow-indigo-200 transition mt-1">注册</button>
        </form>

        <p class="text-center text-sm text-gray-400 mt-5">已有账号？<a href="/login" class="text-indigo-500 font-medium hover:underline">去登录</a></p>
      </div>
    </div>
  </div>
  <script>lucide.createIcons();</script>
</body>
</html>
{{ end }}
