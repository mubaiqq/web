{{ define "403.html" }}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>403 — DomainOS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    body{-webkit-font-smoothing:antialiased}
    .page-bg{background:linear-gradient(135deg,#eef2ff 0%,#e0e7ff 30%,#f0f9ff 60%,#ede9fe 100%)}
  </style>
</head>
<body class="page-bg text-gray-900 min-h-screen flex items-center justify-center px-6">
  <div class="text-center">
    <div class="w-16 h-16 rounded-2xl bg-red-100 flex items-center justify-center mx-auto mb-6">
      <i data-lucide="shield-off" class="w-8 h-8 text-red-400"></i>
    </div>
    <h1 class="text-6xl font-extrabold text-gray-200 mb-2">403</h1>
    <p class="text-lg font-semibold text-gray-600 mb-2">权限不足</p>
    <p class="text-sm text-gray-400 mb-8">{{ if .Message }}{{ .Message }}{{ else }}你没有权限访问此页面{{ end }}</p>
    <a href="/" class="inline-flex items-center gap-2 px-6 py-2.5 bg-gradient-to-r from-indigo-500 to-violet-500 text-white text-sm font-semibold rounded-xl shadow-md shadow-indigo-200 hover:from-indigo-600 hover:to-violet-600 transition">
      <i data-lucide="home" class="w-4 h-4"></i>
      返回首页
    </a>
  </div>
  <script>lucide.createIcons();</script>
</body>
</html>
{{ end }}
