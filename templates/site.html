{{ define "site.html" }}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .Title }}</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',-apple-system,sans-serif;background:linear-gradient(135deg,#eef2ff,#e0e7ff,#f0f9ff,#ede9fe);min-height:100vh;display:flex;align-items:center;justify-content:center;color:#111827;-webkit-font-smoothing:antialiased}
    .wrap{text-align:center;padding:3rem;max-width:640px;background:rgba(255,255,255,0.6);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.5);border-radius:2rem;box-shadow:0 8px 40px rgba(99,102,241,0.08)}
    h1{font-size:2.5rem;font-weight:800;letter-spacing:-0.5px;margin-bottom:1.2rem;background:linear-gradient(135deg,#312e81,#6366f1);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .content{font-size:1.05rem;line-height:1.8;color:#6b7280}
    .tag{margin-top:2rem;display:inline-block;padding:0.3rem 1rem;background:rgba(255,255,255,0.6);border:1px solid rgba(255,255,255,0.5);border-radius:999px;font-size:0.8rem;color:#9ca3af;font-family:ui-monospace,monospace}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>{{ .Title }}</h1>
    <div class="content">{{ .Content }}</div>
    <div class="tag">{{ .Host }}</div>
  </div>
</body>
</html>
{{ end }}
